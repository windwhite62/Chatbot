services:
  - type: web
    name: lambersart-chatbot
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --workers 2 --timeout 60
    envVars:
      - key: MISTRAL_API_KEY
        sync: false
      - key: ADMIN_TOKEN
        sync: false
      - key: ALLOWED_ORIGINS
        value: "*"
      - key: MISTRAL_MODEL
        value: mistral-small-latest
